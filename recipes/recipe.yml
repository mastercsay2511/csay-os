# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: csay-os
description: CSAY OS - Private, secure, gaming desktop with local AI
base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable
modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- Add the VS Code RPM Repository & Package ---
  - type: rpm-ostree
    repos:
      - https://packages.microsoft.com/yumrepos/vscode/vscode.repo
    install:
      - code

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - com.brave.Browser
          - org.libreoffice.LibreOffice
          - org.videolan.VLC
          - org.mozilla.Thunderbird
          - org.keepassxc.KeePassXC
          - org.gimp.GIMP
          - com.github.tchx84.Flatseal

  - type: systemd
    system:
      enabled:
        - tailscaled.service

  - type: os-release
    properties:
      NAME: CSAY OS
      PRETTY_NAME: CSAY OS
